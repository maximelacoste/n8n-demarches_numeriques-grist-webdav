<text x="86" y="103" text-anchor="middle" font-size="11" fill="#993C1D">famille · élève</text>


<line x1="150" y1="92" x2="170" y2="92" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arr)"/>

