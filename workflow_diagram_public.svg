<text x="614" y="171" text-anchor="middle" font-size="11" fill="#27500A">sync DN → Grist (automatique)</text>

<!-- OTP → Table (remonte) -->
<line x1="614" y1="134" x2="614" y2="120" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arr)"/>
<!-- DN → OTP -->
<line x1="462" y1="160" x2="490" y2="160" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrm)"/>

<!-- Grist → Lire Grist : passe PAR LA DROITE, au-delà de la zone Grist, puis descend -->
  <path d="M736,92 L775,92 L775,248 L446,248" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrm)"/>

