<!-- DN → n8n -->
<line x1="312" y1="186" x2="312" y2="222" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arr)"/>

<!-- Lire Grist -->
<rect x="178" y="222" width="268" height="52" rx="7" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<text x="312" y="241" text-anchor="middle" font-size="13" font-weight="600" fill="#26215C">Lire Grist</text>
<text x="312" y="259" text-anchor="middle" font-size="11" fill="#3C3489">lecture table · returnAll</text>
<line x1="312" y1="274" x2="312" y2="287" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arr)"/>

<!-- Filtrer — logique interne n8n : GRIS NEUTRE -->
<rect x="178" y="287" width="268" height="40" rx="7" fill="#E8E7E0" stroke="#5F5E5A" stroke-width="0.8"/>
<text x="312" y="301" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">Filtrer non-déposés</text>
<text x="312" y="317" text-anchor="middle" font-size="11" fill="#444441">archive_nuage ≠ true</text>
<line x1="312" y1="327" x2="312" y2="340" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arr)"/>

<!-- Boucle — logique interne n8n : GRIS NEUTRE pointillé -->
<rect x="178" y="340" width="268" height="40" rx="7" fill="#E8E7E0" stroke="#5F5E5A" stroke-width="0.8" stroke-dasharray="5 3"/>
<text x="312" y="354" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">↻  Boucle sur les dossiers</text>
<text x="312" y="370" text-anchor="middle" font-size="11" fill="#444441">SplitInBatches · 1 dossier à la fois</text>
<line x1="312" y1="380" x2="312" y2="393" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arr)"/>

<!-- Appel GraphQL DN -->
<rect x="178" y="393" width="268" height="52" rx="7" fill="#FAECE7" stroke="#D85A30" stroke-width="0.8"/>
<text x="312" y="412" text-anchor="middle" font-size="13" font-weight="600" fill="#712B13">Appel GraphQL DN</text>
<text x="312" y="430" text-anchor="middle" font-size="11" fill="#993C1D">PJ usager · PJ instructeurs · annotations</text>
<line x1="312" y1="445" x2="312" y2="458" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arr)"/>

<!-- Préparer + MKCOL -->
<rect x="178" y="458" width="268" height="52" rx="7" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="312" y="477" text-anchor="middle" font-size="13" font-weight="600" fill="#042C53">Préparer + MKCOL</text>
<text x="312" y="495" text-anchor="middle" font-size="11" fill="#0C447C">nom dossier élève · création dossier WebDAV</text>
<line x1="312" y1="510" x2="312" y2="523" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arr)"/>

<!-- Download & PUT -->
<rect x="178" y="523" width="268" height="52" rx="7" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="312" y="542" text-anchor="middle" font-size="13" font-weight="600" fill="#042C53">Download &amp; PUT</text>
<text x="312" y="560" text-anchor="middle" font-size="11" fill="#0C447C">GET fichier DN · PUT Nuage · binaryMode:separate</text>
<line x1="312" y1="575" x2="312" y2="588" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arr)"/>

<!-- Marquer déposé -->
<rect x="178" y="588" width="268" height="52" rx="7" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<text x="312" y="607" text-anchor="middle" font-size="13" font-weight="600" fill="#26215C">Marquer comme déposé</text>
<text x="312" y="625" text-anchor="middle" font-size="11" fill="#3C3489">archive_nuage = true · écriture Grist</text>

<!-- Nuage (dans la zone n8n) -->
<rect x="502" y="523" width="240" height="52" rx="7" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="622" y="542" text-anchor="middle" font-size="13" font-weight="600" fill="#042C53">Nuage</text>
<text x="622" y="560" text-anchor="middle" font-size="11" fill="#0C447C">instance WebDAV Education Nationale</text>
<line x1="446" y1="549" x2="500" y2="549" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arr)"/>

